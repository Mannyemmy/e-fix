name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cPanel Git Deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /home/elitccyv/e-fix-git
            git pull origin main
            # Sync only changed files — skip vendor, node_modules, .git (they don't change)
            rsync -a --checksum \
              --exclude='.git' \
              --exclude='node_modules' \
              --exclude='vendor' \
              --exclude='storage/logs' \
              --exclude='bootstrap/cache' \
              /home/elitccyv/e-fix-git/ /home/elitccyv/e-fix/
            # Sync public assets into web root
            rsync -a --checksum \
              --exclude='.git' \
              /home/elitccyv/e-fix-git/public/ /home/elitccyv/public_html/
            cd /home/elitccyv/e-fix
            php artisan config:clear
            php artisan cache:clear
            php artisan view:clear
            php artisan storage:link || true